# Sentry CLI configuration for Cyphergy Legal
# Used by sentry-cli for source maps, releases, and deploy tracking.
# CPAA: Auth token is read from SENTRY_TOKEN env var at runtime.

defaults.org=
defaults.project=cyphergy
defaults.url=https://sentry.io/

# CLI reads auth from env: SENTRY_AUTH_TOKEN (or SENTRY_TOKEN)
# Do NOT put tokens in this file.
# cli.executable=sentry-cli
