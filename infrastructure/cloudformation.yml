AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Cyphergy — Core AWS Infrastructure
  ECS Fargate + ALB + ECR + S3 + CloudWatch + IAM
  CPAA-compliant: all secrets via Secrets Manager, no hardcoded values

# =============================================================================
# Parameters
# =============================================================================
Parameters:

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]
    Description: Deployment environment

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the ECS cluster and ALB

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet for ALB

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet for ALB

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First private subnet for ECS tasks

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second private subnet for ECS tasks

  CertificateArn:
    Type: String
    Description: ACM certificate ARN for HTTPS on the ALB

  ContainerImage:
    Type: String
    Default: ""
    Description: Full ECR image URI (account.dkr.ecr.region.amazonaws.com/repo:tag). Leave blank for initial stack creation.

  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 10
    Description: Number of ECS tasks to run

  TaskCpu:
    Type: String
    Default: "1024"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]
    Description: CPU units for the ECS task

  TaskMemory:
    Type: String
    Default: "2048"
    AllowedValues: ["512", "1024", "2048", "4096", "8192"]
    Description: Memory (MiB) for the ECS task

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasContainerImage: !Not [!Equals [!Ref ContainerImage, ""]]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # ECR Repository
  # ---------------------------------------------------------------------------
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: cyphergy-api
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 20 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: Cyphergy
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # S3 Document Storage (encrypted, versioned, no public access)
  # ---------------------------------------------------------------------------
  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cyphergy-documents-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 90
          - Id: CleanupIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Project
          Value: Cyphergy
        - Key: Environment
          Value: !Ref Environment

  DocumentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DocumentBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EnforceTLS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt DocumentBucket.Arn
              - !Sub "${DocumentBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": false

  # ---------------------------------------------------------------------------
  # CloudWatch Log Group
  # ---------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/cyphergy-api
      RetentionInDays: 90
      Tags:
        - Key: Project
          Value: Cyphergy
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # Security Groups
  # ---------------------------------------------------------------------------

  # ALB Security Group — public HTTPS ingress only
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cyphergy ALB — public HTTPS access
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirects to HTTPS)
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          DestinationSecurityGroupId: !Ref ECSSecurityGroup
          Description: To ECS tasks on port 8000
      Tags:
        - Key: Name
          Value: cyphergy-alb-sg
        - Key: Project
          Value: Cyphergy

  # ECS Security Group — only accepts traffic from ALB
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Cyphergy ECS tasks — ALB traffic only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: From ALB only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound (API calls, ECR, Secrets Manager)
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0
          Description: PostgreSQL (Aurora)
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 0.0.0.0/0
          Description: Redis (ElastiCache)
      Tags:
        - Key: Name
          Value: cyphergy-ecs-sg
        - Key: Project
          Value: Cyphergy

  # ---------------------------------------------------------------------------
  # IAM Roles
  # ---------------------------------------------------------------------------

  # ECS Task Execution Role — pulls images, reads secrets, writes logs
  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "cyphergy-ecs-execution-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cyphergy/*"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt LogGroup.Arn
                  - !Sub "${LogGroup.Arn}:*"
      Tags:
        - Key: Project
          Value: Cyphergy

  # ECS Task Role — what the running application can do
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "cyphergy-ecs-task-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DocumentAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentBucket.Arn
                  - !Sub "${DocumentBucket.Arn}/*"
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cyphergy/*"
      Tags:
        - Key: Project
          Value: Cyphergy

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: cyphergy-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: Project
          Value: Cyphergy
        - Key: Environment
          Value: !Ref Environment

  # Target Group — routes to ECS tasks on port 8000
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: cyphergy-tg
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      Tags:
        - Key: Project
          Value: Cyphergy

  # HTTPS Listener (443)
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # HTTP Listener (80) — redirect to HTTPS
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # ---------------------------------------------------------------------------
  # ECS Cluster
  # ---------------------------------------------------------------------------
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "cyphergy-${Environment}"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Project
          Value: Cyphergy
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # ECS Task Definition
  # ---------------------------------------------------------------------------
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Condition: HasContainerImage
    Properties:
      Family: cyphergy-api
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: cyphergy-api
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -sf http://localhost:8000/health || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 15
          Secrets:
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cyphergy/anthropic-api-key"
            - Name: DATABASE_URL
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cyphergy/database-url"
            - Name: REDIS_URL
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cyphergy/redis-url"
            - Name: COURTLISTENER_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:cyphergy/courtlistener-api-key"
          Environment:
            - Name: APP_ENV
              Value: !Ref Environment
            - Name: LOG_LEVEL
              Value: INFO
            - Name: LLM_PROVIDER
              Value: anthropic
            - Name: LLM_MODEL
              Value: claude-opus-4-6
            - Name: LLM_TEMPERATURE
              Value: "0.0"
            - Name: EXTERNAL_RETRIEVAL_REQUIRED
              Value: "true"
            - Name: WDC_CERTIFICATION_THRESHOLD
              Value: "8.5"
            - Name: S3_DOCUMENT_BUCKET
              Value: !Ref DocumentBucket
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: cyphergy
          LinuxParameters:
            InitProcessEnabled: true
      Tags:
        - Key: Project
          Value: Cyphergy
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # ECS Service
  # ---------------------------------------------------------------------------
  ECSService:
    Type: AWS::ECS::Service
    Condition: HasContainerImage
    DependsOn: HTTPSListener
    Properties:
      ServiceName: cyphergy-api
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      LoadBalancers:
        - ContainerName: cyphergy-api
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Project
          Value: Cyphergy
        - Key: Environment
          Value: !Ref Environment

# =============================================================================
# Outputs
# =============================================================================
Outputs:

  ALBDnsName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-ALBDnsName"

  ALBHostedZoneId:
    Description: Hosted zone ID of the ALB (for Route53 alias records)
    Value: !GetAtt ALB.CanonicalHostedZoneID

  ECSClusterName:
    Description: Name of the ECS cluster
    Value: !Ref ECSCluster

  ECSServiceName:
    Condition: HasContainerImage
    Description: Name of the ECS service
    Value: !GetAtt ECSService.Name

  ECRRepositoryUri:
    Description: URI of the ECR repository
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-ECRUri"

  DocumentBucketName:
    Description: S3 bucket for document storage
    Value: !Ref DocumentBucket
    Export:
      Name: !Sub "${AWS::StackName}-DocBucket"

  DocumentBucketArn:
    Description: ARN of the document storage bucket
    Value: !GetAtt DocumentBucket.Arn

  ExecutionRoleArn:
    Description: ARN of the ECS task execution role
    Value: !GetAtt ECSExecutionRole.Arn

  TaskRoleArn:
    Description: ARN of the ECS task role
    Value: !GetAtt ECSTaskRole.Arn

  LogGroupName:
    Description: CloudWatch log group for ECS tasks
    Value: !Ref LogGroup
