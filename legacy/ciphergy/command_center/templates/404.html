{% extends "base.html" %}

{% block content %}

<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; text-align: center;">
    <div class="empty-state-icon" style="font-size: 72px; opacity: 0.25; margin-bottom: 16px;">&#9878;</div>
    <h2 style="font-size: 28px; font-weight: 800; color: var(--navy); margin-bottom: 8px;">Page Not Found</h2>
    <p style="font-size: 15px; color: var(--gray-text); max-width: 440px; line-height: 1.6; margin-bottom: 24px;">
        The requested page does not exist in the Command Center. It may have been moved, removed, or the URL may be incorrect.
    </p>
    <a href="/" class="btn btn-primary" style="text-decoration: none; padding: 10px 28px; font-size: 14px;">
        Return to Situation Board
    </a>
</div>

{% endblock %}
