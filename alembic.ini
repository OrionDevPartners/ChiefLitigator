# Alembic configuration for Cyphergy database migrations.
#
# DATABASE_URL is sourced from the environment (CPAA-compliant).
# The sqlalchemy.url in this file is a placeholder that gets
# overridden in alembic/env.py at runtime.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Truncate long revision identifiers
truncate_slug_length = 40

# Placeholder — overridden by env.py from DATABASE_URL env var
sqlalchemy.url = postgresql+asyncpg://localhost/cyphergy

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
