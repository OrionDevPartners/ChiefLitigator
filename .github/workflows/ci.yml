# Cyphergy CI Pipeline
# Runs on every push and pull request
# Quality gates: lint, typecheck, test, security, secrets-scan
# Requirement: CICD-1 — all gates enforced, no continue-on-error

name: CI

on:
  push:
    branches: [main, dev, staging, "feature/**"]
  pull_request:
    branches: [main, dev, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint (ruff check + ruff format)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ──────────────────────────────────────────────
  # Job 2: Type checking (mypy)
  # ──────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install optional type stubs
        run: pip install types-redis sentry-sdk --quiet

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-warn-unused-ignores

  # ──────────────────────────────────────────────
  # Job 3: Tests (pytest + coverage, matrix)
  # ──────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v \
            -m "not integration"

      - name: Run integration tests (if API key available)
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest \
            --cov=src \
            --cov-append \
            --cov-report=term-missing \
            -v \
            -m "integration"

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 4: Security (pip-audit + bandit)
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pip-audit bandit

      - name: Dependency audit (pip-audit)
        run: pip-audit

      - name: SAST scan (bandit)
        run: bandit -r src/ -ll -f json -o bandit-report.json || true && bandit -r src/ -ll

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ──────────────────────────────────────────────
  # Job 5: Secrets scan (gitleaks)
  # ──────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
