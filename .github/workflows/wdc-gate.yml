name: WDC Merge Gate

# Blocks ALL PRs from merging unless a WDC review comment exists
# with a passing score. Specifically targets Devin PRs but applies
# to all external contributors.
#
# How it works:
# 1. Triggered on PR comments and PR review submissions
# 2. Searches for a comment containing "WDC REVIEW" + "COMPOSITE SCORE"
# 3. Extracts the score and compares against threshold (7.5)
# 4. Sets a required status check that blocks merge until passing
#
# To approve a PR after WDC review, post a comment like:
#   WDC REVIEW: feature/remaining-agents
#   COMPOSITE SCORE: 8.2 / 10
#   DECISION: MERGE

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  wdc-gate:
    name: WDC Approval Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request)

    steps:
      - name: Check for WDC approval comment
        id: wdc_check
        uses: actions/github-script@v7
        with:
          script: |
            const WDC_THRESHOLD = 7.5;
            const SECURITY_THRESHOLD = 6.0;

            // Get PR number
            let prNumber;
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'issue_comment') {
              prNumber = context.payload.issue.number;
            } else {
              prNumber = context.payload.pull_request.number;
            }

            // Get all comments on the PR
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            // Search for a WDC review comment
            let wdcApproved = false;
            let wdcScore = 0;
            let wdcDecision = 'NONE';
            let reviewerLogin = '';

            for (const comment of comments.data) {
              const body = comment.body || '';

              // Look for WDC REVIEW pattern
              if (body.includes('WDC REVIEW') || body.includes('COMPOSITE SCORE')) {

                // Extract composite score
                const scoreMatch = body.match(/COMPOSITE\s*SCORE[:\s]*(\d+\.?\d*)\s*\/\s*10/i);
                if (scoreMatch) {
                  wdcScore = parseFloat(scoreMatch[1]);
                }

                // Extract decision
                const decisionMatch = body.match(/DECISION[:\s]*(MERGE|REVISE|REJECT)/i);
                if (decisionMatch) {
                  wdcDecision = decisionMatch[1].toUpperCase();
                }

                // Check for security auto-reject
                const securityMatch = body.match(/SECURITY[^:]*?[:\s]*(\d+\.?\d*)\s*\/\s*10/i);
                if (securityMatch) {
                  const secScore = parseFloat(securityMatch[1]);
                  if (secScore < SECURITY_THRESHOLD) {
                    core.setFailed(`WDC SECURITY AUTO-REJECT: Security score ${secScore} < ${SECURITY_THRESHOLD} threshold`);
                    return;
                  }
                }

                // Check for any agent auto-reject (below 4)
                const agentScores = body.matchAll(/Score[:\s]*(\d+\.?\d*)\s*\/\s*10/gi);
                for (const match of agentScores) {
                  const agentScore = parseFloat(match[1]);
                  if (agentScore < 4.0) {
                    core.setFailed(`WDC AUTO-REJECT: Agent score ${agentScore} < 4.0 minimum`);
                    return;
                  }
                }

                // Validate composite meets threshold
                if (wdcScore >= WDC_THRESHOLD && wdcDecision === 'MERGE') {
                  wdcApproved = true;
                  reviewerLogin = comment.user.login;
                }
              }
            }

            if (wdcApproved) {
              core.info(`WDC APPROVED: Score ${wdcScore}/10, Decision: ${wdcDecision}, Reviewer: ${reviewerLogin}`);
            } else if (wdcScore > 0) {
              core.setFailed(`WDC BLOCKED: Score ${wdcScore}/10 (threshold: ${WDC_THRESHOLD}), Decision: ${wdcDecision}. Post a passing WDC review comment to unblock.`);
            } else {
              core.setFailed('WDC REVIEW REQUIRED: No WDC review comment found. Run a 5-agent WDC review and post the results as a PR comment before merging.');
            }

      - name: Check for deletion protection
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // Get changed files in PR
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const deletedFiles = files.data.filter(f => f.status === 'removed');
            const protectedPaths = [
              'DOCS/',
              'MEMORY.md',
              'GUARDRAILS.yml',
              'CLAUDE.md',
              'SECURITY.md',
              'src/verification/citation_chain.py',
              'src/legal/deadline_calc.py',
              '.claude/',
            ];

            const violations = [];
            for (const file of deletedFiles) {
              for (const protected of protectedPaths) {
                if (file.filename.startsWith(protected) || file.filename === protected) {
                  violations.push(`DELETION BLOCKED: ${file.filename} is a protected path`);
                }
              }
            }

            if (violations.length > 0) {
              core.setFailed(
                'CAUTION DELETION REQUEST — Protected files cannot be deleted via PR.\n' +
                violations.join('\n') +
                '\n\nPer @M:001: Explain what + why, get user approval before deletion.'
              );
            } else if (deletedFiles.length > 0) {
              core.warning(
                `PR deletes ${deletedFiles.length} file(s): ${deletedFiles.map(f => f.filename).join(', ')}. ` +
                'Verify these deletions are intentional.'
              );
            }
